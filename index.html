<style>
@font-face { font-family: 'Hanifah Salamah'; src: url('assets/fonts/Hanifah_Salamah.otf') format('opentype'); font-weight: normal; font-display: swap; }
@font-face { font-family: 'Mixta Sharp'; src: url('assets/fonts/Mixta-Sharp-Hair-.otf') format('opentype'); font-weight: 100; font-display: swap; }
@font-face { font-family: 'Mixta Sharp'; src: url('assets/fonts/Mixta-Sharp-Ultra-Light.otf') format('opentype'); font-weight: 200; font-display: swap; }
@font-face { font-family: 'Mixta Sharp'; src: url('assets/fonts/Mixta-Sharp-Thin.otf') format('opentype'); font-weight: 300; font-display: swap; }
@font-face { font-family: 'Mixta Sharp'; src: url('assets/fonts/Mixta-Sharp-Light.otf') format('opentype'); font-weight: 350; font-display: swap; }
@font-face { font-family: 'Mixta Sharp'; src: url('assets/fonts/Mixta-Sharp-Medium.otf') format('opentype'); font-weight: 500; font-display: swap; }
@font-face { font-family: 'Mixta Sharp'; src: url('assets/fonts/Mixta-Sharp-Heavy.otf') format('opentype'); font-weight: 600; font-display: swap; }
@font-face { font-family: 'Mixta Sharp'; src: url('assets/fonts/Mixta-Sharp-Bold.otf') format('opentype'); font-weight: 700; font-display: swap; }

<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --gold:        #B8922B;
  --gold-light:  #D4AE52;
  --slate:       #3F5059;
  --slate-light: #5C7080;
  --taupe:       #C0B2AA;
  --taupe-light: #DDD4CE;
  --cream:       #FDFAF6;
  --warm-white:  #F3EDE4;
  --mist:        #9E9088;
  --script:      'Hanifah Salamah', cursive;
  --sans:        'Mixta Sharp', Georgia, serif;
}

html { scroll-behavior: smooth; scroll-padding-top: 120px; }

body {
  background: var(--cream);
  color: var(--slate);
  font-family: var(--sans);
  font-weight: 300;
  -webkit-font-smoothing: antialiased;
}

/* ── NAV ── */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 1100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 20px 48px 20px 88px;
  background: rgba(253,250,246,0.92);
  backdrop-filter: blur(8px);
  border-bottom: 1px solid transparent;
  transition: border-color 0.4s;
}
nav.scrolled { border-bottom-color: var(--taupe-light); }
.nav-logo {
  font-family: var(--script);
  font-size: 26px;
  color: var(--slate);
  text-decoration: none;
  line-height: 1;
}
.nav-logo span { color: var(--gold); }
.nav-links { display: flex; gap: 36px; align-items: center; }
.nav-links a {
  font-family: var(--sans); font-weight: 300; font-size: 11px;
  letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--mist); text-decoration: none;
  transition: color 0.2s;
}
.nav-links a:hover { color: var(--slate); }
.lang-toggle {
  display: flex; gap: 0; border: 1px solid var(--taupe-light);
}
.lang-btn {
  background: none; border: none; cursor: pointer;
  font-family: var(--sans); font-weight: 300; font-size: 10px;
  letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--mist); padding: 6px 12px;
  transition: all 0.2s;
}
.lang-btn.active { background: var(--slate); color: var(--cream); }

/* ── SECTIONS ── */
section { padding: 120px 48px; }

.section-inner {
  max-width: 760px; margin: 0 auto; text-align: center;
}

.section-label {
  font-family: var(--sans); font-weight: 300; font-size: 10px;
  letter-spacing: 0.28em; text-transform: uppercase;
  color: var(--mist); margin-bottom: 20px;
}

.section-title {
  font-family: var(--script); font-size: 60px;
  color: var(--slate); line-height: 1.1;
  margin-bottom: 20px;
}

.section-title .gold { color: var(--gold); }

.hairline {
  width: 48px; height: 1px; background: var(--taupe-light);
  margin: 20px auto;
}

.ornament-row {
  display: flex; align-items: center; gap: 10px;
  margin: 24px auto; max-width: 200px;
}
.ornament-row .line { flex: 1; height: 1px; background: var(--taupe-light); }
.ornament-row .dot { width: 4px; height: 4px; border-radius: 50%; background: var(--taupe); }
.ornament-row .dot-gold { width: 5px; height: 5px; border-radius: 50%; background: var(--gold); }

/* ── HERO ── */
#hero {
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  padding: 120px 48px 80px;
  position: relative; overflow: hidden;
}
.hero-protea {
  position: absolute;
  right: -60px; bottom: -80px;
  width: 520px; opacity: 0.07;
  pointer-events: none; user-select: none;
}
.hero-protea-top {
  position: absolute;
  left: -80px; top: -80px;
  width: 380px; opacity: 0.05;
  transform: rotate(180deg);
  pointer-events: none; user-select: none;
}
.hero-inner { position: relative; z-index: 1; text-align: center; }
.hero-date {
  font-family: var(--sans); font-weight: 500;
  font-size: 13px; letter-spacing: 0.32em;
  text-transform: uppercase; color: var(--gold);
  margin-bottom: 32px;
}
.hero-names {
  font-family: var(--script); font-size: 96px;
  color: var(--slate); line-height: 1;
  margin-bottom: 12px;
}
.hero-names .amp { color: var(--gold); }
.hero-headline {
  font-family: var(--script); font-size: 44px;
  color: var(--slate-light); line-height: 1.4;
  margin-bottom: 8px;
}
.hero-sub {
  font-family: var(--script); font-size: 30px;
  color: var(--mist); line-height: 1.4;
  margin-bottom: 48px;
}
.hero-location {
  font-family: var(--sans); font-weight: 300;
  font-size: 12px; letter-spacing: 0.2em;
  text-transform: uppercase; color: var(--mist);
  margin-bottom: 48px;
}
.btn-primary {
  display: inline-block;
  background: var(--slate); color: var(--cream);
  border: none; padding: 16px 44px;
  font-family: var(--sans); font-weight: 300;
  font-size: 11px; letter-spacing: 0.22em;
  text-transform: uppercase; cursor: pointer;
  text-decoration: none;
  transition: background 0.25s;
}
.btn-primary:hover { background: var(--slate-light); }
.btn-outline {
  display: inline-block;
  background: transparent; color: var(--slate);
  border: 1px solid var(--taupe-light); padding: 16px 44px;
  font-family: var(--sans); font-weight: 300;
  font-size: 11px; letter-spacing: 0.22em;
  text-transform: uppercase; cursor: pointer;
  text-decoration: none;
  transition: all 0.25s;
}
.btn-outline:hover { border-color: var(--slate); }
.btn-row { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }

/* ── COUNTDOWN ── */
#countdown { background: var(--warm-white); }
.countdown-grid {
  display: flex; justify-content: center; gap: 0;
  margin-top: 48px;
}
.countdown-item {
  padding: 32px 40px;
  text-align: center;
  border-right: 1px solid var(--taupe-light);
}
.countdown-item:last-child { border-right: none; }
.countdown-num {
  font-family: var(--sans); font-weight: 900;
  font-size: 64px; color: var(--slate);
  line-height: 1; display: block;
  letter-spacing: -0.02em;
}
.countdown-label {
  font-family: var(--sans); font-weight: 200;
  font-size: 10px; letter-spacing: 0.24em;
  text-transform: uppercase; color: var(--mist);
  display: block; margin-top: 10px;
}

/* ── PROGRAMME STRIP ── */
.programme-strip {
  display: flex; justify-content: center; gap: 0;
  margin-top: 48px; border: 1px solid var(--taupe-light);
}
.prog-item {
  flex: 1; padding: 32px 24px; text-align: center;
  border-right: 1px solid var(--taupe-light);
}
.prog-item:last-child { border-right: none; }
.prog-date {
  font-family: var(--sans); font-weight: 600;
  font-size: 22px; color: var(--gold);
  letter-spacing: 0.04em; display: block;
  margin-bottom: 8px;
}
.prog-title {
  font-family: var(--sans); font-weight: 500;
  font-size: 11px; letter-spacing: 0.16em;
  text-transform: uppercase; color: var(--slate);
  display: block; margin-bottom: 6px;
}
.prog-sub {
  font-family: var(--sans); font-weight: 200;
  font-size: 11px; color: var(--mist);
  letter-spacing: 0.06em; line-height: 1.6;
}

/* ── LOCATION ── */
.location-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 48px; margin-top: 48px; text-align: left;
}
.location-info { display: flex; flex-direction: column; gap: 28px; }
.loc-block {}
.loc-label {
  font-family: var(--sans); font-weight: 300; font-size: 10px;
  letter-spacing: 0.24em; text-transform: uppercase;
  color: var(--gold); margin-bottom: 8px;
}
.loc-title {
  font-family: var(--sans); font-weight: 600;
  font-size: 16px; color: var(--slate);
  letter-spacing: 0.04em; margin-bottom: 6px;
}
.loc-body {
  font-family: var(--sans); font-weight: 200;
  font-size: 13px; color: var(--mist);
  letter-spacing: 0.04em; line-height: 2;
}
.map-wrap {
  border: 1px solid var(--taupe-light);
  overflow: hidden;
  align-self: stretch;
  min-height: 340px;
  display: flex;
}
.map-wrap > div { flex: 1; }
.map-wrap iframe { display: block; width: 100%; height: 100%; min-height: 340px; border: none; }

/* Light/elegant filter on map tiles to match wedding aesthetic */
.leaflet-tile {
  filter: grayscale(0.6) brightness(1.08) contrast(0.92);
}
/* Keep Leaflet under the fixed navbar */
.leaflet-container,
.leaflet-pane,
.leaflet-top,
.leaflet-bottom,
.leaflet-control { z-index: 5 !important; }
.leaflet-popup-pane { z-index: 6 !important; }

/* Leaflet markers */
.wedding-marker { background: transparent; border: none; }
.marker-pin {
  width: 32px; height: 40px; position: relative;
  display: flex; align-items: center; justify-content: center;
}
.marker-pin::before {
  content: ''; position: absolute; inset: 0;
  background: var(--gold); border-radius: 50% 50% 50% 0;
  transform: rotate(-45deg); transform-origin: center;
  box-shadow: 0 2px 6px rgba(0,0,0,0.25);
}
.marker-pin.marker-reception::before { background: var(--slate); }
.marker-pin span {
  position: relative; z-index: 1;
  color: var(--warm-white); font-family: var(--sans);
  font-weight: 600; font-size: 14px;
  margin-top: -6px;
}
.leaflet-popup-content {
  font-family: var(--sans); font-size: 12px; line-height: 1.5;
  color: var(--slate);
}
.leaflet-popup-content b {
  font-weight: 500; color: var(--gold);
  letter-spacing: 0.06em; text-transform: uppercase;
  font-size: 10px;
}

/* ── RSVP ── */
#rsvp { background: var(--warm-white); }
.rsvp-form { max-width: 520px; margin: 48px auto 0; text-align: left; }
.form-row { margin-bottom: 28px; }
.form-label {
  display: block;
  font-family: var(--sans); font-weight: 300; font-size: 10px;
  letter-spacing: 0.22em; text-transform: uppercase;
  color: var(--mist); margin-bottom: 10px;
}
.form-input {
  width: 100%; border: none;
  border-bottom: 1px solid var(--taupe-light);
  background: transparent; padding: 10px 0;
  font-family: var(--sans); font-weight: 300;
  font-size: 14px; color: var(--slate);
  letter-spacing: 0.04em; outline: none;
  transition: border-color 0.2s;
}
.form-input:focus { border-bottom-color: var(--gold); }
.form-input::placeholder { color: var(--taupe); }
.toggle-row { display: flex; gap: 12px; }
.toggle-btn {
  flex: 1; border: 1px solid var(--taupe-light);
  background: transparent; padding: 13px 8px;
  font-family: var(--sans); font-weight: 300; font-size: 11px;
  letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--mist); cursor: pointer;
  transition: all 0.25s;
}
.toggle-btn.active {
  border-color: var(--gold); color: var(--gold);
  background: rgba(184,146,43,0.04);
}
.days-row { display: flex; gap: 12px; }
.day-btn {
  flex: 1; border: 1px solid var(--taupe-light);
  background: transparent; padding: 13px 4px;
  font-family: var(--sans); font-weight: 300; font-size: 10px;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--mist); cursor: pointer;
  transition: all 0.25s; text-align: center;
}
.day-btn .day-num {
  font-family: var(--sans); font-weight: 700;
  font-size: 20px; display: block;
  letter-spacing: 0; margin-bottom: 3px;
  color: var(--slate);
}
.day-btn.active { border-color: var(--gold); }
.day-btn.active .day-num { color: var(--gold); }
.day-btn.active { color: var(--gold); }
.rsvp-submit {
  width: 100%; margin-top: 12px;
}
.success-box {
  text-align: center; padding: 60px 32px;
}
.success-title {
  font-family: var(--script); font-size: 52px;
  color: var(--gold); margin-bottom: 12px;
}
.success-text {
  font-family: var(--sans); font-weight: 200;
  font-size: 14px; color: var(--mist);
  letter-spacing: 0.06em; line-height: 2;
}

/* ── MUSIC ── */
#music { background: var(--warm-white); }
.music-frame-wrap {
  max-width: 680px; margin: 48px auto 0;
  background: var(--cream);
  border: 1px solid var(--taupe-light);
  position: relative;
  padding: 24px;
  box-shadow: 0 1px 0 rgba(0,0,0,0.02);
}
.music-frame-wrap::before,
.music-frame-wrap::after {
  content: ''; position: absolute;
  width: 24px; height: 24px;
  border: 1px solid var(--gold);
  opacity: 0.5;
}
.music-frame-wrap::before { top: -1px; left: -1px; border-right: none; border-bottom: none; }
.music-frame-wrap::after { bottom: -1px; right: -1px; border-left: none; border-top: none; }
.music-frame { width: 100%; border: none; display: block; background: transparent; }
.music-icon {
  display: block; margin: 0 auto 18px;
  color: var(--gold);
}

/* ── NOTES ── */
#notes { background: var(--cream); }
.notes-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 64px; max-width: 900px; margin: 48px auto 0;
  text-align: left;
}
.notes-block .section-label { margin-bottom: 14px; }
.notes-text {
  font-family: var(--sans); font-weight: 200;
  font-size: 14px; color: var(--mist);
  letter-spacing: 0.04em; line-height: 1.9;
  margin-bottom: 24px;
}
.contacts-list { display: flex; flex-direction: column; gap: 14px; }
.contact-item {
  display: flex; flex-direction: column; gap: 2px;
}
.contact-name {
  font-family: var(--sans); font-weight: 600;
  font-size: 14px; color: var(--slate);
  letter-spacing: 0.04em;
}
.contact-phone {
  font-family: var(--sans); font-weight: 300;
  font-size: 14px; color: var(--gold);
  letter-spacing: 0.04em; text-decoration: none;
  transition: color 0.2s;
}
.contact-phone:hover { color: var(--slate); }

/* ── PHOTOS ── */
.upload-zone {
  border: 1px dashed var(--taupe-light);
  padding: 64px 48px; margin-top: 48px;
  text-align: center; cursor: pointer;
  transition: border-color 0.25s, background 0.25s;
  position: relative;
}
.upload-zone:hover, .upload-zone.drag-over {
  border-color: var(--gold);
  background: rgba(184,146,43,0.03);
}
.upload-zone input[type=file] {
  position: absolute; inset: 0; opacity: 0;
  cursor: pointer; width: 100%; height: 100%;
}
.upload-icon {
  display: block; margin: 0 auto 20px;
  color: var(--taupe);
}
.upload-title {
  font-family: var(--sans); font-weight: 500;
  font-size: 13px; letter-spacing: 0.16em;
  text-transform: uppercase; color: var(--slate);
  margin-bottom: 8px;
}
.upload-sub {
  font-family: var(--sans); font-weight: 200;
  font-size: 12px; color: var(--mist);
  letter-spacing: 0.06em; line-height: 1.8;
}
.upload-preview {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
  gap: 12px; margin-top: 24px;
}
.preview-thumb {
  aspect-ratio: 1; object-fit: cover;
  border: 1px solid var(--taupe-light);
}
.upload-count {
  margin-top: 20px;
  font-family: var(--sans); font-weight: 300;
  font-size: 11px; letter-spacing: 0.14em;
  text-transform: uppercase; color: var(--gold);
}

/* ── FOOTER ── */
footer {
  background: var(--slate); color: var(--cream);
  padding: 64px 48px; text-align: center;
}
.footer-names {
  font-family: var(--script); font-size: 52px;
  color: var(--cream); line-height: 1;
  margin-bottom: 8px;
}
.footer-names span { color: var(--gold); }
.footer-date {
  font-family: var(--sans); font-weight: 200;
  font-size: 12px; letter-spacing: 0.28em;
  text-transform: uppercase; color: rgba(253,250,246,0.4);
  margin-bottom: 32px;
}
.footer-line { width: 40px; height: 1px; background: rgba(255,255,255,0.15); margin: 24px auto; }
.footer-note {
  font-family: var(--sans); font-weight: 200;
  font-size: 11px; letter-spacing: 0.1em;
  color: rgba(253,250,246,0.35); line-height: 2;
}

/* ── RESPONSIVE ── */
@media (max-width: 700px) {
  nav { padding: 16px 24px 16px 40px; }
  .nav-links { gap: 20px; }
  .nav-links a { display: none; }
  section { padding: 80px 24px; }
  #hero { padding: 100px 24px 60px; }
  .hero-names { font-size: 64px; }
  .hero-headline { font-size: 32px; }
  .hero-sub { font-size: 22px; }
  .countdown-grid { gap: 0; flex-wrap: wrap; }
  .countdown-item { padding: 24px 20px; flex: 0 0 50%; border-bottom: 1px solid var(--taupe-light); }
  .countdown-num { font-size: 44px; }
  .programme-strip { flex-direction: column; }
  .prog-item { border-right: none; border-bottom: 1px solid var(--taupe-light); }
  .location-grid { grid-template-columns: 1fr; }
  .notes-grid { grid-template-columns: 1fr; gap: 48px; }
  .days-row { flex-wrap: wrap; }
  footer { padding: 48px 24px; }
  .hero-protea { width: 320px; right: -40px; }
}
</style>
</head>

/* ── COUNTDOWN HOOK ── */
function useCountdown(target) {
  const [diff, setDiff] = useState(0);
  useEffect(() => {
    const tick = () => setDiff(Math.max(0, new Date(target) - new Date()));
    tick();
    const id = setInterval(tick, 1000);
    return () => clearInterval(id);
  }, [target]);
  const s = Math.floor(diff / 1000);
  return {
    days:    Math.floor(s / 86400),
    hours:   Math.floor((s % 86400) / 3600),
    minutes: Math.floor((s % 3600) / 60),
    seconds: s % 60,
  };
}

function CaputhMap({ lang }) {
  const ref = useRef(null);
  const mapRef = useRef(null);

  useEffect(() => {
    if (!window.L || !ref.current || mapRef.current) return;

    const church = [52.348232, 13.001406];
    const reception = [52.350300, 12.998231];
    const center = [(church[0] + reception[0]) / 2, (church[1] + reception[1]) / 2];

    const map = window.L.map(ref.current, { scrollWheelZoom: false }).setView(center, 16);
    mapRef.current = map;

    window.L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap',
      maxZoom: 19,
    }).addTo(map);

    const churchIcon = window.L.divIcon({
      className: 'wedding-marker',
      html: '<div class="marker-pin marker-church"><span>1</span></div>',
      iconSize: [32, 40],
      iconAnchor: [16, 40],
    });
    const receptionIcon = window.L.divIcon({
      className: 'wedding-marker',
      html: '<div class="marker-pin marker-reception"><span>2</span></div>',
      iconSize: [32, 40],
      iconAnchor: [16, 40],
    });

    const labels = lang === 'de'
      ? { church: '<b>Trauung</b><br/>Kirche Caputh<br/>Straße der Einheit 1', reception: '<b>Hauptfeier</b><br/>SchlossGalerie Haape<br/>Krughof 38' }
      : { church: '<b>Ceremony</b><br/>Kirche Caputh<br/>Straße der Einheit 1', reception: '<b>Reception</b><br/>SchlossGalerie Haape<br/>Krughof 38' };

    window.L.marker(church, { icon: churchIcon }).addTo(map).bindPopup(labels.church);
    window.L.marker(reception, { icon: receptionIcon }).addTo(map).bindPopup(labels.reception);

    map.fitBounds([church, reception], { padding: [60, 60], maxZoom: 17 });

    // Force tile reload after layout settles
    const sizeTimer = setTimeout(() => map.invalidateSize(), 100);
    const sizeTimer2 = setTimeout(() => map.invalidateSize(), 500);
    const onResize = () => map.invalidateSize();
    window.addEventListener('resize', onResize);

    return () => {
      clearTimeout(sizeTimer);
      clearTimeout(sizeTimer2);
      window.removeEventListener('resize', onResize);
      map.remove();
      mapRef.current = null;
    };
  }, [lang]);

  return <div className="map-wrap"><div ref={ref} style={{ width: '100%', minHeight: 340 }}></div></div>;
}

function RSVP({ c }) {
  const FORMSPREE_ID = 'xqewvoeo';

  const f = c.rsvp.fields;
  const [attending, setAttending] = useState(true);
  const [days, setDays] = useState([true, true]);
  const [submitted, setSubmitted] = useState(false);
  const [submitting, setSubmitting] = useState(false);
  const [error, setError] = useState('');
  const [name, setName] = useState('');
  const [guests, setGuests] = useState('');

  const toggleDay = (i) => setDays(d => d.map((v, j) => j === i ? !v : v));

  const handleSubmit = async () => {
    if (!name.trim()) {
      setError('Bitte gebt Euren Namen an. / Please enter your name.');
      return;
    }
    setError('');
    setSubmitting(true);

    const payload = {
      Name: name,
      Personen: guests || '1',
      Zusage: attending ? 'JA – wir kommen' : 'NEIN – wir können nicht',
      'Trauung 12:00': attending ? (days[0] ? '✓ dabei' : '— nicht dabei') : '—',
      'Hauptfeier 14:00': attending ? (days[1] ? '✓ dabei' : '— nicht dabei') : '—',
      _subject: `RSVP ${attending ? '✓' : '✗'} – ${name}`,
    };

    try {
      const res = await fetch(`https://formspree.io/f/${FORMSPREE_ID}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
        body: JSON.stringify(payload),
      });
      if (res.ok) {
        setSubmitted(true);
      } else {
        const data = await res.json().catch(() => ({}));
        setError(data.error || 'Senden fehlgeschlagen. Bitte später erneut versuchen.');
      }
    } catch (e) {
      setError('Netzwerkfehler. Bitte später erneut versuchen.');
    } finally {
      setSubmitting(false);
    }
  };

  if (submitted) {
    return (
      <section id="rsvp">
        <div className="section-inner">
          <div className="success-box">
            <div className="success-title">{c.rsvp.success.title}</div>
            <OrnamentRow />
            <div className="success-text" style={{ whiteSpace: 'pre-line' }}>{c.rsvp.success.text}</div>
          </div>
        </div>
      </section>
    );
  }

  return (
    <section id="rsvp">
      <div className="section-inner">
        <div className="section-label">{c.rsvp.label}</div>
        <div className="section-title">{c.rsvp.title}</div>
        <OrnamentRow />
        <div style={{ fontFamily: "'Mixta Sharp', serif", fontWeight: 200, fontSize: 13, color: 'var(--mist)', letterSpacing: '0.06em', marginBottom: 0 }}>
          {c.rsvp.sub}
        </div>
        <div className="rsvp-form">
          <div className="form-row">
            <label className="form-label">{f.name}</label>
            <input className="form-input" placeholder={f.namePh} value={name} onChange={e => setName(e.target.value)} />
          </div>
          <div className="form-row">
            <label className="form-label">{f.guests}</label>
            <input className="form-input" placeholder={f.guestsPh} type="number" min="1" value={guests} onChange={e => setGuests(e.target.value)} />
          </div>
          <div className="form-row">
            <div className="toggle-row">
              <button className={`toggle-btn${attending ? ' active' : ''}`} onClick={() => setAttending(true)}>{f.attend[0]}</button>
              <button className={`toggle-btn${!attending ? ' active' : ''}`} onClick={() => setAttending(false)}>{f.attend[1]}</button>
            </div>
          </div>
          {attending && (
            <div className="form-row">
              <label className="form-label">{f.daysLabel}</label>
              <div className="days-row">
                {f.days.map((d, i) => (
                  <button key={d} className={`day-btn${days[i] ? ' active' : ''}`} onClick={() => toggleDay(i)}>
                    <span className="day-num">{d.split(' ')[0].replace('.','')}</span>
                    {d.split(' ')[1]}
                  </button>
                ))}
              </div>
            </div>
          )}
          {error && (
            <div style={{ color: '#B85C2B', fontFamily: "var(--sans)", fontSize: 12, marginBottom: 16, letterSpacing: '0.04em' }}>
              {error}
            </div>
          )}
          <button className="btn-primary rsvp-submit" disabled={submitting} onClick={handleSubmit}>
            {submitting ? '...' : f.submit}
          </button>
        </div>
      </div>
    </section>
  );
}

function App() {
  const [lang, setLang] = useState(() => localStorage.getItem('wedding_lang') || 'de');
  useEffect(() => { localStorage.setItem('wedding_lang', lang); }, [lang]);
  const c = COPY[lang];
  return (
    <>
      <Nav lang={lang} setLang={setLang} c={c} />
      <Hero c={c} />
      <Countdown c={c} />
      <Location c={c} lang={lang} />
      <RSVP c={c} />
      <Notes c={c} />
      <Music c={c} />
      <Photos c={c} lang={lang} />
      <Footer c={c} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
