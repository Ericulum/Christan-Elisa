<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
@font-face { font-family: 'Mixta Sharp'; src: url('../assets/fonts/Mixta-Sharp-Hair-.otf') format('opentype'); font-weight: 100; font-display: swap; }
@font-face { font-family: 'Mixta Sharp'; src: url('../assets/fonts/Mixta-Sharp-Ultra-Light.otf') format('opentype'); font-weight: 200; font-display: swap; }
@font-face { font-family: 'Mixta Sharp'; src: url('../assets/fonts/Mixta-Sharp-Thin.otf') format('opentype'); font-weight: 300; font-display: swap; }
@font-face { font-family: 'Mixta Sharp'; src: url('../assets/fonts/Mixta-Sharp-Light.otf') format('opentype'); font-weight: 350; font-display: swap; }
@font-face { font-family: 'Mixta Sharp'; src: url('../assets/fonts/Mixta-Sharp-Medium.otf') format('opentype'); font-weight: 500; font-display: swap; }
@font-face { font-family: 'Mixta Sharp'; src: url('../assets/fonts/Mixta-Sharp-Heavy.otf') format('opentype'); font-weight: 600; font-display: swap; }
@font-face { font-family: 'Mixta Sharp'; src: url('../assets/fonts/Mixta-Sharp-Bold.otf') format('opentype'); font-weight: 700; font-display: swap; }
@font-face { font-family: 'Mixta Sharp'; src: url('../assets/fonts/Mixta-Sharp-Black.otf') format('opentype'); font-weight: 900; font-display: swap; }
</style>
<style>
@font-face {
  font-family: 'Hanifah Salamah';
  src: url('../assets/fonts/Hanifah Salamah.otf') format('opentype');
  font-weight: normal;
  font-style: normal;
  font-display: swap;
}
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Pinyon+Script&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--color-cream); padding: 20px 28px; display: flex; gap: 32px; }
.col { flex: 1; }
.row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
.bar-wrap { flex: 1; background: var(--color-warm-white); border-radius: 2px; height: 12px; }
.bar { height: 12px; background: var(--color-taupe); border-radius: 2px; }
.meta { font-family: var(--font-serif); font-size: 10px; color: var(--color-mist); letter-spacing: 0.05em; width: 80px; }
.token { font-family: var(--font-serif); font-size: 10px; color: var(--color-slate-light); width: 56px; }
</style>
</head><body>
<div class="col">
  <div class="row"><div class="token">--space-1</div><div class="bar-wrap"><div class="bar" style="width:4px"></div></div><div class="meta">4px</div></div>
  <div class="row"><div class="token">--space-2</div><div class="bar-wrap"><div class="bar" style="width:8px"></div></div><div class="meta">8px</div></div>
  <div class="row"><div class="token">--space-3</div><div class="bar-wrap"><div class="bar" style="width:12px"></div></div><div class="meta">12px</div></div>
  <div class="row"><div class="token">--space-4</div><div class="bar-wrap"><div class="bar" style="width:16px"></div></div><div class="meta">16px</div></div>
  <div class="row"><div class="token">--space-5</div><div class="bar-wrap"><div class="bar" style="width:24px"></div></div><div class="meta">24px</div></div>
</div>
<div class="col">
  <div class="row"><div class="token">--space-6</div><div class="bar-wrap"><div class="bar" style="width:32px"></div></div><div class="meta">32px</div></div>
  <div class="row"><div class="token">--space-7</div><div class="bar-wrap"><div class="bar" style="width:48px"></div></div><div class="meta">48px</div></div>
  <div class="row"><div class="token">--space-8</div><div class="bar-wrap"><div class="bar" style="width:64px"></div></div><div class="meta">64px</div></div>
  <div class="row"><div class="token">--space-9</div><div class="bar-wrap"><div class="bar" style="width:96px"></div></div><div class="meta">96px</div></div>
  <div class="row"><div class="token">--space-10</div><div class="bar-wrap"><div class="bar" style="width:128px"></div></div><div class="meta">128px</div></div>
</div>
</body></html>
