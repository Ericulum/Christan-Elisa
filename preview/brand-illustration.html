<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
@font-face { font-family: 'Mixta Sharp'; src: url('../assets/fonts/Mixta-Sharp-Hair-.otf') format('opentype'); font-weight: 100; font-display: swap; }
@font-face { font-family: 'Mixta Sharp'; src: url('../assets/fonts/Mixta-Sharp-Ultra-Light.otf') format('opentype'); font-weight: 200; font-display: swap; }
@font-face { font-family: 'Mixta Sharp'; src: url('../assets/fonts/Mixta-Sharp-Thin.otf') format('opentype'); font-weight: 300; font-display: swap; }
@font-face { font-family: 'Mixta Sharp'; src: url('../assets/fonts/Mixta-Sharp-Light.otf') format('opentype'); font-weight: 350; font-display: swap; }
@font-face { font-family: 'Mixta Sharp'; src: url('../assets/fonts/Mixta-Sharp-Medium.otf') format('opentype'); font-weight: 500; font-display: swap; }
@font-face { font-family: 'Mixta Sharp'; src: url('../assets/fonts/Mixta-Sharp-Heavy.otf') format('opentype'); font-weight: 600; font-display: swap; }
@font-face { font-family: 'Mixta Sharp'; src: url('../assets/fonts/Mixta-Sharp-Bold.otf') format('opentype'); font-weight: 700; font-display: swap; }
@font-face { font-family: 'Mixta Sharp'; src: url('../assets/fonts/Mixta-Sharp-Black.otf') format('opentype'); font-weight: 900; font-display: swap; }
</style>
<style>
@font-face {
  font-family: 'Hanifah Salamah';
  src: url('../assets/fonts/Hanifah Salamah.otf') format('opentype');
  font-weight: normal;
  font-style: normal;
  font-display: swap;
}
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Pinyon+Script&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--color-cream); display: flex; align-items: center; padding: 20px 32px; gap: 40px; }
.variant { text-align: center; }
.img-wrap { display: flex; align-items: center; justify-content: center; }
img { display: block; }
.label { font-family: var(--font-serif); font-size: 10px; color: var(--color-mist); letter-spacing: 0.12em; text-transform: uppercase; margin-top: 8px; }
</style>
</head><body>
  <div class="variant">
    <div class="img-wrap" style="width:120px;height:160px"><img src="../assets/Protea.png" style="height:160px;width:auto;opacity:1"></div>
    <div class="label">100% opacity</div>
  </div>
  <div class="variant">
    <div class="img-wrap" style="width:120px;height:160px"><img src="../assets/Protea.png" style="height:160px;width:auto;opacity:0.5"></div>
    <div class="label">50% — watermark</div>
  </div>
  <div class="variant">
    <div class="img-wrap" style="width:120px;height:160px;background:var(--color-slate);border-radius:2px"><img src="../assets/Protea.png" style="height:160px;width:auto;opacity:0.3;filter:brightness(10)"></div>
    <div class="label">On dark bg</div>
  </div>
  <div style="flex:1">
    <div style="font-family:var(--font-serif);font-size:11px;color:var(--color-slate-light);line-height:1.8;letter-spacing:0.03em">
      <strong style="letter-spacing:0.1em;text-transform:uppercase;font-size:10px;color:var(--color-mist)">Protea</strong><br>
      The central brand motif.<br>
      Line-art, single-weight strokes.<br>
      Color: <span style="color:var(--color-taupe)">#C0B2AA</span> Taupe.<br>
      Used large, as a background element.
    </div>
  </div>
</body></html>
