<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
@font-face { font-family: 'Mixta Sharp'; src: url('../assets/fonts/Mixta-Sharp-Hair-.otf') format('opentype'); font-weight: 100; font-display: swap; }
@font-face { font-family: 'Mixta Sharp'; src: url('../assets/fonts/Mixta-Sharp-Ultra-Light.otf') format('opentype'); font-weight: 200; font-display: swap; }
@font-face { font-family: 'Mixta Sharp'; src: url('../assets/fonts/Mixta-Sharp-Thin.otf') format('opentype'); font-weight: 300; font-display: swap; }
@font-face { font-family: 'Mixta Sharp'; src: url('../assets/fonts/Mixta-Sharp-Light.otf') format('opentype'); font-weight: 350; font-display: swap; }
@font-face { font-family: 'Mixta Sharp'; src: url('../assets/fonts/Mixta-Sharp-Medium.otf') format('opentype'); font-weight: 500; font-display: swap; }
@font-face { font-family: 'Mixta Sharp'; src: url('../assets/fonts/Mixta-Sharp-Heavy.otf') format('opentype'); font-weight: 600; font-display: swap; }
@font-face { font-family: 'Mixta Sharp'; src: url('../assets/fonts/Mixta-Sharp-Bold.otf') format('opentype'); font-weight: 700; font-display: swap; }
@font-face { font-family: 'Mixta Sharp'; src: url('../assets/fonts/Mixta-Sharp-Black.otf') format('opentype'); font-weight: 900; font-display: swap; }
</style>
<style>
@font-face {
  font-family: 'Hanifah Salamah';
  src: url('../assets/fonts/Hanifah Salamah.otf') format('opentype');
  font-weight: normal;
  font-style: normal;
  font-display: swap;
}
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Pinyon+Script&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--color-cream); padding: 24px; font-family: var(--font-serif); }
.grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
.item { display: flex; align-items: center; gap: 10px; }
.dot { width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0; border: 1px solid rgba(0,0,0,0.06); }
.label { font-size: 11px; color: #3F5059; letter-spacing: 0.03em; }
.var { font-size: 10px; color: #9E9088; margin-top: 2px; }
</style>
</head><body>
<div class="grid">
  <div class="item"><div class="dot" style="background:var(--bg-primary)"></div><div><div class="label">bg-primary</div><div class="var">Cream</div></div></div>
  <div class="item"><div class="dot" style="background:var(--bg-secondary)"></div><div><div class="label">bg-secondary</div><div class="var">Warm White</div></div></div>
  <div class="item"><div class="dot" style="background:var(--fg-primary)"></div><div><div class="label">fg-primary</div><div class="var">Slate</div></div></div>
  <div class="item"><div class="dot" style="background:var(--fg-secondary)"></div><div><div class="label">fg-secondary</div><div class="var">Slate Light</div></div></div>
  <div class="item"><div class="dot" style="background:var(--fg-muted)"></div><div><div class="label">fg-muted</div><div class="var">Mist</div></div></div>
  <div class="item"><div class="dot" style="background:var(--fg-accent)"></div><div><div class="label">fg-accent</div><div class="var">Gold</div></div></div>
  <div class="item"><div class="dot" style="background:var(--accent-hover)"></div><div><div class="label">accent-hover</div><div class="var">Gold Light</div></div></div>
  <div class="item"><div class="dot" style="background:var(--border-subtle)"></div><div><div class="label">border-subtle</div><div class="var">Taupe Light</div></div></div>
</div>
</body></html>
