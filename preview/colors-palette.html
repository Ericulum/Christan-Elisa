<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
@font-face { font-family: 'Mixta Sharp'; src: url('../assets/fonts/Mixta-Sharp-Hair-.otf') format('opentype'); font-weight: 100; font-display: swap; }
@font-face { font-family: 'Mixta Sharp'; src: url('../assets/fonts/Mixta-Sharp-Ultra-Light.otf') format('opentype'); font-weight: 200; font-display: swap; }
@font-face { font-family: 'Mixta Sharp'; src: url('../assets/fonts/Mixta-Sharp-Thin.otf') format('opentype'); font-weight: 300; font-display: swap; }
@font-face { font-family: 'Mixta Sharp'; src: url('../assets/fonts/Mixta-Sharp-Light.otf') format('opentype'); font-weight: 350; font-display: swap; }
@font-face { font-family: 'Mixta Sharp'; src: url('../assets/fonts/Mixta-Sharp-Medium.otf') format('opentype'); font-weight: 500; font-display: swap; }
@font-face { font-family: 'Mixta Sharp'; src: url('../assets/fonts/Mixta-Sharp-Heavy.otf') format('opentype'); font-weight: 600; font-display: swap; }
@font-face { font-family: 'Mixta Sharp'; src: url('../assets/fonts/Mixta-Sharp-Bold.otf') format('opentype'); font-weight: 700; font-display: swap; }
@font-face { font-family: 'Mixta Sharp'; src: url('../assets/fonts/Mixta-Sharp-Black.otf') format('opentype'); font-weight: 900; font-display: swap; }
</style>
<style>
@font-face {
  font-family: 'Hanifah Salamah';
  src: url('../assets/fonts/Hanifah Salamah.otf') format('opentype');
  font-weight: normal;
  font-style: normal;
  font-display: swap;
}
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Pinyon+Script&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--color-cream); padding: 24px; font-family: var(--font-serif); }
.row { display: flex; gap: 12px; margin-bottom: 12px; }
.swatch { flex: 1; border-radius: 3px; overflow: hidden; }
.chip { height: 60px; }
.meta { padding: 6px 8px; background: white; }
.name { font-size: 11px; font-weight: 500; color: #3F5059; letter-spacing: 0.04em; }
.hex { font-size: 10px; color: #9E9088; letter-spacing: 0.04em; margin-top: 1px; }
</style>
</head><body>
<div class="row">
  <div class="swatch"><div class="chip" style="background:#B8922B"></div><div class="meta"><div class="name">Gold</div><div class="hex">#B8922B</div></div></div>
  <div class="swatch"><div class="chip" style="background:#D4AE52"></div><div class="meta"><div class="name">Gold Light</div><div class="hex">#D4AE52</div></div></div>
  <div class="swatch"><div class="chip" style="background:#8C6D1C"></div><div class="meta"><div class="name">Gold Dark</div><div class="hex">#8C6D1C</div></div></div>
</div>
<div class="row">
  <div class="swatch"><div class="chip" style="background:#3F5059"></div><div class="meta"><div class="name">Slate</div><div class="hex">#3F5059</div></div></div>
  <div class="swatch"><div class="chip" style="background:#5C7080"></div><div class="meta"><div class="name">Slate Light</div><div class="hex">#5C7080</div></div></div>
  <div class="swatch"><div class="chip" style="background:#28353C"></div><div class="meta"><div class="name">Slate Dark</div><div class="hex">#28353C</div></div></div>
</div>
<div class="row">
  <div class="swatch"><div class="chip" style="background:#C0B2AA"></div><div class="meta"><div class="name">Taupe</div><div class="hex">#C0B2AA</div></div></div>
  <div class="swatch"><div class="chip" style="background:#DDD4CE"></div><div class="meta"><div class="name">Taupe Light</div><div class="hex">#DDD4CE</div></div></div>
  <div class="swatch"><div class="chip" style="background:#FDFAF6"></div><div class="meta"><div class="name">Cream</div><div class="hex">#FDFAF6</div></div></div>
</div>
</body></html>
