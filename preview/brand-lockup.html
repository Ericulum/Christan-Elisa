<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
@font-face { font-family: 'Mixta Sharp'; src: url('../assets/fonts/Mixta-Sharp-Hair-.otf') format('opentype'); font-weight: 100; font-display: swap; }
@font-face { font-family: 'Mixta Sharp'; src: url('../assets/fonts/Mixta-Sharp-Ultra-Light.otf') format('opentype'); font-weight: 200; font-display: swap; }
@font-face { font-family: 'Mixta Sharp'; src: url('../assets/fonts/Mixta-Sharp-Thin.otf') format('opentype'); font-weight: 300; font-display: swap; }
@font-face { font-family: 'Mixta Sharp'; src: url('../assets/fonts/Mixta-Sharp-Light.otf') format('opentype'); font-weight: 350; font-display: swap; }
@font-face { font-family: 'Mixta Sharp'; src: url('../assets/fonts/Mixta-Sharp-Medium.otf') format('opentype'); font-weight: 500; font-display: swap; }
@font-face { font-family: 'Mixta Sharp'; src: url('../assets/fonts/Mixta-Sharp-Heavy.otf') format('opentype'); font-weight: 600; font-display: swap; }
@font-face { font-family: 'Mixta Sharp'; src: url('../assets/fonts/Mixta-Sharp-Bold.otf') format('opentype'); font-weight: 700; font-display: swap; }
@font-face { font-family: 'Mixta Sharp'; src: url('../assets/fonts/Mixta-Sharp-Black.otf') format('opentype'); font-weight: 900; font-display: swap; }
</style>
<style>
@font-face {
  font-family: 'Hanifah Salamah';
  src: url('../assets/fonts/Hanifah Salamah.otf') format('opentype');
  font-weight: normal;
  font-style: normal;
  font-display: swap;
}
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Pinyon+Script&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--color-cream); display: flex; gap: 32px; align-items: stretch; padding: 24px; }
.card { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; gap: 6px; }
.divider { width: 40px; height: 1px; background: var(--color-taupe-light); margin: 8px 0; }
.label { font-family: var(--font-serif); font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--color-mist); }
.dark { background: var(--color-slate); border-radius: 2px; }
</style>
</head><body>
  <!-- Light lockup -->
  <div class="card">
    <div style="font-family:var(--font-script);font-size:44px;color:var(--color-slate);line-height:1">Elisa</div>
    <div style="font-family:var(--font-script);font-size:52px;color:var(--color-gold);line-height:0.9">&amp;</div>
    <div style="font-family:var(--font-script);font-size:44px;color:var(--color-slate);line-height:1">Christan</div>
    <div class="divider"></div>
    <div class="label">On cream</div>
  </div>

  <!-- Dark lockup -->
  <div class="card dark">
    <div style="font-family:var(--font-script);font-size:44px;color:var(--color-cream);line-height:1">Elisa</div>
    <div style="font-family:var(--font-script);font-size:52px;color:var(--color-gold);line-height:0.9">&amp;</div>
    <div style="font-family:var(--font-script);font-size:44px;color:var(--color-cream);line-height:1">Christan</div>
    <div class="divider" style="background:rgba(255,255,255,0.15)"></div>
    <div class="label" style="color:rgba(255,255,255,0.4)">On slate</div>
  </div>

  <!-- Inline lockup -->
  <div class="card" style="background:var(--color-warm-white);border-radius:2px">
    <div style="font-family:var(--font-display);font-size:32px;color:var(--color-gold);line-height:1.2;text-align:center">Wir heiraten –</div>
    <div style="font-family:var(--font-script);font-size:22px;color:var(--color-slate-light);line-height:1.4;text-align:center">und es wird mehr als ein Fest!</div>
    <div class="divider"></div>
    <div class="label">Headline lockup</div>
  </div>
</body></html>
